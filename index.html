<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#f3f1ec">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<title>איציק לא פה | תיק חירום ותפעול</title>
<style>
  :root{
    --bg:#f3f1ec;
    --surface:#ffffff;
    --surface-2:#eee9df;
    --cream:#25211a;
    --muted:#7a7164;
    --gold:#e0a300;
    --gold-dim:#b98400;
    --teal:#0eb6a1;
    --teal-dim:#0b8c7c;
    --red:#ef7414;
    --red-bright:#ff8c3d;
    --line:#e2dcce;
    --radius:12px;
    font-family:"Segoe UI", Arial, "Helvetica Neue", sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--cream);
    direction:rtl; text-align:right; min-height:100vh;
    padding-bottom:84px;
  }
  a{ color:inherit; }
  button, input{ font-family:inherit; }

  header{
    background:linear-gradient(180deg,#faf9f6,#f3f1ec 92%);
    border-bottom:1px solid var(--line);
    padding:16px 18px 0;
    position:sticky; top:0; z-index:30;
    position:relative;
  }
  .top{ max-width:900px; margin:0 auto; text-align:center; }
  .top-row{ display:flex; flex-direction:column; align-items:center; gap:0; }
  .eyebrow{ color:var(--gold-dim); font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; direction:ltr; display:block; }
  h1{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:clamp(28px, 8vw, 44px); font-weight:900; margin:8px 0 6px; letter-spacing:-1.5px;
    line-height:1.05; text-align:center;
    color:#171512;
    position:relative; display:inline-block;
  }
  .hero-wrap{ display:flex; justify-content:center; }
  .hero-rule{ width:54px; height:3px; background:var(--gold-dim); border-radius:2px; margin:2px auto 10px; }
  .sub{ color:var(--muted); font-size:13px; margin:0 auto 14px; max-width:440px; text-align:center; }

  .settings-btn{
    position:absolute; top:16px; left:16px;
    flex:none; background:var(--surface); border:1px solid var(--line); color:var(--cream);
    width:38px; height:38px; border-radius:10px; font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .settings-btn.active{ background:var(--teal); border-color:var(--teal); color:#fff; }

  .edit-banner{
    max-width:900px; margin:0 auto 10px; background:rgba(14,182,161,.1);
    border:1px solid var(--teal-dim); color:var(--teal-dim); border-radius:10px;
    padding:9px 14px; font-size:12.5px; font-weight:700; display:none;
  }
  .edit-banner.show{ display:block; }

  .logo-row{ display:flex; justify-content:center; margin-bottom:6px; }
  .logo-row img{ height:52px; width:auto; border-radius:8px; }

  /* small floating emergency dial buttons — tucked to the side, unobtrusive */
  .dial-float{
    position:fixed; top:50%; right:6px; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:8px; z-index:25;
  }
  .dial-circle{
    width:38px; height:38px; border-radius:50%;
    background:var(--surface); border:1.5px solid var(--red);
    color:var(--red); text-decoration:none;
    display:flex; align-items:center; justify-content:center;
    font-size:10.5px; font-weight:800; direction:ltr;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    opacity:.88; transition:opacity .15s ease, transform .15s ease;
  }
  .dial-circle:active{ transform:scale(.92); opacity:1; }

  .search-wrap{ max-width:900px; margin:0 auto 14px; padding:0 18px; }
  .search-box{
    width:100%; background:var(--surface); border:1px solid var(--line); color:var(--cream);
    border-radius:10px; padding:11px 14px; font-size:14px; font-family:inherit;
  }
  .search-box::placeholder{ color:var(--muted); }
  .search-box:focus{ outline:none; border-color:var(--gold-dim); }

  nav.tabs{
    max-width:900px; margin:0 auto; display:flex; gap:6px; overflow-x:auto;
    padding:0 18px 12px; -ms-overflow-style:none; scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:none; background:var(--surface); color:var(--muted); border:1px solid var(--line);
    padding:8px 15px; border-radius:999px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .tab-btn.active{ background:var(--gold); border-color:var(--gold); color:#1a1712; }

  main{ max-width:900px; margin:18px auto; padding:0 18px; }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin-bottom:14px;
  }
  .card h2{ margin:0 0 3px; font-size:16.5px; font-weight:800; }
  .card .note{ color:var(--muted); font-size:12.5px; margin-bottom:12px; }
  .section-label{
    color:var(--gold); font-size:11px; font-weight:800; text-transform:uppercase;
    letter-spacing:.6px; margin:0 0 10px;
  }

  input.edit-in{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--cream);
    border-radius:7px; padding:6px 9px; font-size:13px;
  }
  input.edit-in:focus{ outline:none; border-color:var(--gold-dim); }
  input.edit-in::placeholder{ color:var(--muted); }

  /* unit cards */
  .unit-card{ cursor:pointer; }
  .unit-card.editing{ cursor:default; }
  .unit-head{ display:flex; justify-content:space-between; align-items:center; }
  .unit-name{ font-size:16px; font-weight:800; }
  .unit-type{ font-size:11px; color:var(--muted); background:var(--surface-2); padding:3px 9px; border-radius:6px; }
  .unit-meta{ font-size:12.5px; color:var(--muted); margin-top:4px; line-height:1.6; }
  .chev{ color:var(--muted); font-size:13px; transition:transform .2s ease; }
  .unit-card.open .chev{ transform:rotate(180deg); }
  .unit-detail{ display:none; margin-top:14px; border-top:1px solid var(--line); padding-top:12px; }
  .unit-card.open .unit-detail{ display:block; }
  .infra-row{ display:flex; justify-content:space-between; align-items:center; gap:14px; padding:7px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .infra-row:last-child{ border-bottom:none; }
  .infra-k{ color:var(--muted); flex:0 0 38%; }
  .infra-v{ flex:1; text-align:left; direction:rtl; }
  .infra-v.empty{ color:var(--muted); font-style:italic; }
  .meta-edit-row{ display:flex; gap:8px; margin-top:8px; }
  .meta-edit-row input{ flex:1; }

  /* contacts */
  .contact-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 2px; border-bottom:1px solid var(--line);
  }
  .contact-row:last-child{ border-bottom:none; }
  .contact-info{ min-width:0; flex:1; }
  .contact-domain{ font-weight:700; font-size:14px; }
  .contact-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .call-btn{
    flex:none; display:flex; align-items:center; gap:6px; background:var(--surface-2);
    border:1px solid var(--line); color:var(--teal); text-decoration:none; border-radius:999px;
    padding:7px 13px; font-size:12.5px; font-weight:700; direction:ltr;
  }
  .call-btn:hover{ border-color:var(--teal); }
  .no-phone{ color:var(--muted); font-size:12px; }
  .del-x{ flex:none; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px 6px; }
  .del-x:hover{ color:var(--red); }
  .provider-block{ padding:12px 0; border-bottom:1px solid var(--line); }
  .provider-block:last-child{ border-bottom:none; }
  .provider-edit-head{ display:flex; gap:8px; margin-bottom:8px; }
  .contact-edit-row{ display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .add-btn{
    width:100%; margin-top:8px; padding:9px; border:1.5px dashed var(--line); background:none;
    color:var(--muted); border-radius:8px; cursor:pointer; font-size:12.5px; font-weight:700;
  }
  .add-btn:hover{ color:var(--gold); border-color:var(--gold-dim); }
  .add-btn.small{ margin-top:6px; padding:7px; }

  /* emergency chain */
  table.chain{ width:100%; border-collapse:collapse; font-size:13.5px; }
  table.chain th{ text-align:right; color:var(--gold); font-size:11px; text-transform:uppercase; padding:6px 4px; border-bottom:1px solid var(--line); }
  table.chain td{ padding:9px 4px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.chain tr:last-child td{ border-bottom:none; }
  .missing{ color:var(--muted); font-style:italic; }

  .evac-item{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); }
  .evac-item:last-child{ border-bottom:none; }
  .evac-type{ font-weight:700; font-size:14px; }
  .evac-point{ font-size:12.5px; color:var(--muted); margin-top:2px; }

  .highlight-box{
    background:rgba(47,197,160,.12); border:1px solid rgba(47,197,160,.35); border-radius:10px;
    padding:12px 14px; font-size:13px; color:var(--cream); margin-bottom:14px; line-height:1.6;
  }
  .highlight-box b{ color:var(--teal); }
  .warn-box{
    background:rgba(242,169,60,.12); border:1px solid rgba(242,169,60,.35); border-radius:10px;
    padding:12px 14px; font-size:13px; color:var(--cream); margin-bottom:14px; line-height:1.6;
  }
  .warn-box b{ color:var(--gold); }

  .pending-box{ text-align:center; padding:26px 14px; color:var(--muted); font-size:13.5px; }
  .pending-box .big{ font-size:28px; margin-bottom:8px; }

  table.edit{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.edit th{ text-align:right; font-size:10.5px; color:var(--gold); text-transform:uppercase; padding:6px 5px; border-bottom:1px solid var(--line); }
  table.edit td{ padding:4px 5px; border-bottom:1px solid var(--line); }

  .save-note{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--surface-2); border:1px solid var(--teal-dim); color:var(--cream);
    padding:8px 18px; border-radius:999px; font-size:12.5px; opacity:0; transition:opacity .25s ease;
    pointer-events:none; z-index:50;
  }
  .save-note.show{ opacity:1; }

  .source-note{ text-align:center; color:var(--muted); font-size:11.5px; margin:26px 0 6px; }

  ::selection{ background:var(--gold-dim); color:var(--cream); }
</style>
</head>

let UNITS, PROVIDERS, DECISION_CHAIN, EVACUATION, INTERNAL_CONTACTS, LICENSES;

// Real, persistent on-device storage (works standalone / installed as an app — no external service needed)
const STORAGE_PREFIX = 'itzik-lo-po:';
function storageGet(key){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ console.error('read failed', e); return null; }
}
function storageSet(key, val){
  try{ localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(val)); return true; }
  catch(e){ console.error('save failed', e); return false; }
}

async function loadData(){
  UNITS = storageGet('units-override') || JSON.parse(JSON.stringify(DEFAULT_UNITS));
  PROVIDERS = storageGet('providers-override') || JSON.parse(JSON.stringify(DEFAULT_PROVIDERS));
  DECISION_CHAIN = storageGet('chain-override') || JSON.parse(JSON.stringify(DEFAULT_CHAIN));
  EVACUATION = storageGet('evac-override') || JSON.parse(JSON.stringify(DEFAULT_EVAC));
  INTERNAL_CONTACTS = storageGet('internal-override') || JSON.parse(JSON.stringify(DEFAULT_INTERNAL));
  LICENSES = storageGet('licenses-data') || defaultLicenses();
}

function showSaved(){
  const n = document.getElementById('saveNote');
  n.classList.add('show');
  clearTimeout(showSaved._t);
  showSaved._t = setTimeout(()=>n.classList.remove('show'), 1100);
}
async function persist(key, val){
  if(storageSet(key, val)) showSaved();
}

function exportBackup(){
  const data = {
    units: UNITS, providers: PROVIDERS, chain: DECISION_CHAIN,
    evac: EVACUATION, internal: INTERNAL_CONTACTS, licenses: LICENSES,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'itzik-lo-po-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function importBackupFile(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(data.units){ UNITS = data.units; storageSet('units-override', UNITS); }
    if(data.providers){ PROVIDERS = data.providers; storageSet('providers-override', PROVIDERS); }
    if(data.chain){ DECISION_CHAIN = data.chain; storageSet('chain-override', DECISION_CHAIN); }
    if(data.evac){ EVACUATION = data.evac; storageSet('evac-override', EVACUATION); }
    if(data.internal){ INTERNAL_CONTACTS = data.internal; storageSet('internal-override', INTERNAL_CONTACTS); }
    if(data.licenses){ LICENSES = data.licenses; storageSet('licenses-data', LICENSES); }
    showSaved();
    render();
  }catch(e){
    console.error('import failed', e);
    alert('קובץ הגיבוי לא תקין או פגום');
  }
}

function fmtPhone(p){
  if(!p) return '';
  const d = p.replace(/\D/g,'');
  if(d.length===10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  if(d.length===9) return d.slice(0,2)+'-'+d.slice(2,5)+'-'+d.slice(5);
  return d;
}

    });
    wrap.appendChild(block);
  });

  content.querySelector('#addProvider').addEventListener('click', async ()=>{
    PROVIDERS.push({domain:'', company:'', note:'', contacts:[{name:'', phone:''}]});
    await persist('providers-override', PROVIDERS);
    renderContacts();
  });
}

// ---------------- INTERNAL CONTACTS ----------------
function renderInternal(){
  const content = document.getElementById('content');
  const filtered = INTERNAL_CONTACTS.filter(p => matchesQuery(p.name) || matchesQuery(p.role) || matchesQuery(p.unit));
  content.innerHTML = `<div class="card"><div class="section-label">אנשי קשר חשובים בארגון (${filtered.length})</div><div id="internalWrap"></div>${state.editMode ? '<button class="add-btn" id="addInternal">+ הוסף איש קשר</button>' : ''}</div>`;
  const wrap = content.querySelector('#internalWrap');

  if(filtered.length===0 && !state.editMode){
    wrap.innerHTML = `<div class="pending-box"><div class="big">🔍</div>לא נמצאו אנשי קשר תואמים לחיפוש</div>`;
    return;
  }

  if(!state.editMode){
    filtered.forEach(p=>{
      wrap.insertAdjacentHTML('beforeend', `
        <div class="contact-row">
          <div class="contact-info">
            <div class="contact-domain">${p.name}</div>
            <div class="contact-sub">${p.role}${p.unit ? ' · '+p.unit : ''}</div>
          </div>
          ${p.phone ? `<a class="call-btn" href="tel:${p.phone}">📞 ${fmtPhone(p.phone)}</a>` : `<span class="no-phone">אין טלפון</span>`}
        </div>
      `);
    });
    return;
  }

  filtered.forEach((p)=>{
    const pIdx = INTERNAL_CONTACTS.indexOf(p);
    const row = document.createElement('div');
    row.className = 'provider-block';
    row.innerHTML = `
      <div class="provider-edit-head">
        <input class="edit-in" data-if="name" value="${esc(p.name)}" placeholder="שם" style="font-weight:700;">
        <button class="del-x" title="מחק">✕</button>
      </div>
      <div class="meta-edit-row">
        <input class="edit-in" data-if="role" value="${esc(p.role)}" placeholder="תפקיד">
        <input class="edit-in" data-if="unit" value="${esc(p.unit)}" placeholder="יחידה / קבוצתי">
        <input class="edit-in" data-if="phone" value="${esc(p.phone)}" placeholder="טלפון" style="direction:ltr; text-align:left;">
      </div>
    `;
    row.querySelectorAll('[data-if]').forEach(inp=>{
      inp.addEventListener('change', async ()=>{
        p[inp.dataset.if] = inp.value;
        await persist('internal-override', INTERNAL_CONTACTS);
      });
    });
    row.querySelector('.del-x').addEventListener('click', async ()=>{
      INTERNAL_CONTACTS.splice(pIdx,1);
      await persist('internal-override', INTERNAL_CONTACTS);
      renderInternal();
    });
    wrap.appendChild(row);
  });

  content.querySelector('#addInternal').addEventListener('click', async ()=>{
    INTERNAL_CONTACTS.push({name:'', role:'', unit:'', phone:''});
    await persist('internal-override', INTERNAL_CONTACTS);
    renderInternal();
  });
}

// ---------------- LICENSES ----------------
function renderLicenses(){
  const content = document.getElementById('content');
  const filled = LICENSES.filter(l=>l.issuer||l.expiry).length;
  content.innerHTML = `
    <div class="card">
      <div class="section-label">רישיונות ותעודות — ${filled}/${LICENSES.length} מולאו</div>
      <div style="overflow-x:auto;">
      <table class="edit">
        <thead><tr><th>יחידה</th><th>סוג</th><th>גוף מנפיק</th><th>תוקף</th><th>מיקום</th><th>אחראי</th></tr></thead>
        <tbody id="licBody"></tbody>
      </table>
      </div>
    </div>
  `;
  const tbody = content.querySelector('#licBody');
  LICENSES.forEach((l)=>{
    const tr = document.createElement('tr');
    if(state.editMode){
      tr.innerHTML = `
        <td><input class="edit-in" data-lf="unit" value="${esc(l.unit)}"></td>
        <td><input class="edit-in" data-lf="type" value="${esc(l.type)}"></td>
        <td><input class="edit-in" data-lf="issuer" value="${esc(l.issuer)}"></td>
        <td><input class="edit-in" data-lf="expiry" value="${esc(l.expiry)}" placeholder="DD/MM/YYYY"></td>
        <td><input class="edit-in" data-lf="location" value="${esc(l.location)}"></td>
        <td><input class="edit-in" data-lf="renewer" value="${esc(l.renewer)}"></td>
      `;
      tr.querySelectorAll('[data-lf]').forEach(inp=>{
        inp.addEventListener('change', async ()=>{
          l[inp.dataset.lf] = inp.value;
          await persist('licenses-data', LICENSES);
        });
      });
    } else {
      tr.innerHTML = `
        <td>${l.unit}</td><td>${l.type}</td>
        <td>${l.issuer || '<span class="missing">—</span>'}</td>
        <td>${l.expiry || '<span class="missing">—</span>'}</td>
        <td>${l.location || '<span class="missing">—</span>'}</td>
        <td>${l.renewer || '<span class="missing">—</span>'}</td>
      `;
    }
    tbody.appendChild(tr);
  });
}

function render(){
  renderTabs();
  document.getElementById('editBanner').classList.toggle('show', state.editMode);
  document.getElementById('settingsBtn').classList.toggle('active', state.editMode);
  if(state.tab==='emergency') renderEmergency();
  else if(state.tab==='units') renderUnits();
  else if(state.tab==='contacts') renderContacts();
  else if(state.tab==='internal') renderInternal();
  else if(state.tab==='licenses') renderLicenses();
}

renderDialStrip();
document.getElementById('searchBox').addEventListener('input', (e)=>{
  state.query = e.target.value;
  if(state.tab==='emergency') state.tab='units';
  render();
});
document.getElementById('settingsBtn').addEventListener('click', ()=>{
  state.editMode = !state.editMode;
  render();
});

document.getElementById('exportBackupBtn').addEventListener('click', exportBackup);
document.getElementById('importBackupBtn').addEventListener('click', ()=>{
  document.getElementById('importBackupInput').click();
});
document.getElementById('importBackupInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importBackupFile(file);
  e.target.value = '';
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.error('SW registration failed', err));
  });
}

(async function init(){
  await loadData();
  render();
})();
</script>
</body>
</html>
